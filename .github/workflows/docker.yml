name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          path: alist

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/alist-web
          path: alist-web

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Build Frontend
        run: |
          cd alist-web
          bun install
          # Update submodules for solid-router
          git submodule update --init --recursive
          bun run build
          
      - name: Move Frontend to Backend
        run: |
          # Clean existing dist if any and move custom build there
          rm -rf alist/public/dist
          mkdir -p alist/public/dist
          cp -r alist-web/dist/* alist/public/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./alist
          file: ./alist/Dockerfile
          push: true
          build-args: |
            SKIP_WEB_FETCH=true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alist:latest
